<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热血格斗传说 - 完整版模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #ff0000;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #ffff00;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2em;
            color: #ffff00;
            margin-bottom: 30px;
        }
        .screen-container {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            text-align: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #000;
            border: 2px solid #333;
            width: 768px;
            height: 720px;
        }
        .status {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .status.loading { color: #ffff00; }
        .status.ready { color: #00ff00; }
        .status.error { color: #ff0000; }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ff0000;
            color: #fff;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #cc0000;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .controls {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
        .control-section {
            margin-bottom: 15px;
        }
        .control-section h3 {
            color: #ffff00;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .key-map {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 0.9em;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>热血格斗传说</h1>
        <p class="subtitle">Nekketsu Kakutou Densetsu · 完整版模拟器</p>

        <div class="status loading" id="status">正在初始化模拟器...</div>

        <div class="buttons">
            <button id="loadBtn">加载ROM</button>
            <button id="startBtn" disabled>开始游戏</button>
            <button id="resetBtn" disabled>重置</button>
            <button id="pauseBtn" disabled>暂停</button>
        </div>

        <div class="screen-container">
            <canvas id="screen"></canvas>
        </div>

        <div class="controls">
            <div class="control-section">
                <h3>🎮 控制说明</h3>
                <div class="key-map">
                    <div class="key-item"><span>方向</span><span>W A S D</span></div>
                    <div class="key-item"><span>A按钮</span><span>J</span></div>
                    <div class="key-item"><span>B按钮</span><span>K</span></div>
                    <div class="key-item"><span>Select</span><span>Shift</span></div>
                    <div class="key-item"><span>Start</span><span>Enter</span></div>
                </div>
            </div>

            <div class="control-section">
                <h3>ℹ️ 说明</h3>
                <p style="color: #aaa; font-size: 0.9em;">
                    使用 NES.js 模拟器，支持所有mapper类型<br>
                    点击"加载ROM"按钮选择ROM文件开始游戏
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/nesjs@0.2.1/build/nes.min.js"></script>
    <script>
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const loadBtn = document.getElementById('loadBtn');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        let nes = null;
        let isRunning = false;
        let isPaused = false;
        let frameTimer = null;

        // 初始化NES.js
        function initNES() {
            try {
                nes = new NesJs.Nes();
                nes.setDisplay({
                    setPixel: (x, y, color) => {
                        const imageData = ctx.createImageData(1, 1);
                        imageData.data[0] = (color >> 16) & 0xFF;
                        imageData.data[1] = (color >> 8) & 0xFF;
                        imageData.data[2] = color & 0xFF;
                        imageData.data[3] = 255;
                        ctx.putImageData(imageData, x, y);
                    }
                });

                updateStatus('ready', '模拟器已就绪，点击"加载ROM"开始');
            } catch (err) {
                console.error('初始化失败:', err);
                updateStatus('error', '模拟器初始化失败: ' + err.message);
            }
        }

        // 加载ROM
        loadBtn.addEventListener('click', async () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.nes';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                updateStatus('loading', '正在加载ROM...');

                try {
                    const buffer = await file.arrayBuffer();
                    const romData = new Uint8Array(buffer);
                    nes.loadRom(romData);

                    updateStatus('ready', 'ROM加载成功！点击"开始游戏"');
                    startBtn.disabled = false;
                    resetBtn.disabled = false;
                } catch (err) {
                    console.error('ROM加载失败:', err);
                    updateStatus('error', 'ROM加载失败: ' + err.message);
                }
            };
            input.click();
        });

        // 开始游戏
        startBtn.addEventListener('click', () => {
            if (isRunning) return;

            isRunning = true;
            isPaused = false;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '暂停';

            frameTimer = setInterval(() => {
                if (!isPaused) {
                    nes.frame();
                }
            }, 1000 / 60);

            updateStatus('ready', '游戏运行中...');
        });

        // 暂停/继续
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
            updateStatus('ready', isPaused ? '游戏已暂停' : '游戏运行中...');
        });

        // 重置
        resetBtn.addEventListener('click', () => {
            if (frameTimer) {
                clearInterval(frameTimer);
                frameTimer = null;
            }
            isRunning = false;
            isPaused = false;
            pauseBtn.disabled = true;

            nes.reset();
            updateStatus('ready', '游戏已重置');
        });

        // 键盘映射
        const keyMap = {
            'KeyW': 4,      // 上
            'KeyS': 5,      // 下
            'KeyA': 6,      // 左
            'KeyD': 7,      // 右
            'KeyJ': 0,      // A
            'KeyK': 1,      // B
            'ShiftLeft': 2, // Select
            'Enter': 3      // Start
        };

        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;
            if (keyMap[e.code] !== undefined) {
                nes.buttonDown(1, keyMap[e.code]);
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (!isRunning) return;
            if (keyMap[e.code] !== undefined) {
                nes.buttonUp(1, keyMap[e.code]);
                e.preventDefault();
            }
        });

        function updateStatus(type, message) {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        // 检查NesJs是否加载
        if (typeof NesJs !== 'undefined') {
            initNES();
        } else {
            updateStatus('error', 'NES.js库加载失败，请检查网络连接');
        }
    </script>
</body>
</html>
