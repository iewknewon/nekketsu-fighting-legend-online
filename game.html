<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热血格斗传说 - 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #ff0000;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #ffff00;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2em;
            color: #ffff00;
            margin-bottom: 30px;
        }
        .screen-container {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            text-align: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #000;
            border: 2px solid #333;
        }
        .status {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .status.loading { color: #ffff00; }
        .status.ready { color: #00ff00; }
        .status.error { color: #ff0000; }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ff0000;
            color: #fff;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #cc0000;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .controls {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
        .control-section {
            margin-bottom: 15px;
        }
        .control-section h3 {
            color: #ffff00;
            font-size: 1.1em;
            margin-bottom: 10px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 5px;
        }
        .key-map {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 0.9em;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>热血格斗传说</h1>
        <p class="subtitle">Nekketsu Kakutou Densetsu · 完整版模拟器</p>

        <div class="status loading" id="status">正在加载ROM...</div>

        <div class="buttons">
            <button id="startBtn" disabled>开始游戏</button>
            <button id="resetBtn" disabled>重置</button>
            <button id="pauseBtn" disabled>暂停</button>
            <button id="fullscreenBtn">全屏</button>
        </div>

        <div class="screen-container">
            <canvas id="screen" width="256" height="240"></canvas>
        </div>

        <div class="controls">
            <div class="control-section">
                <h3>🎮 玩家1 控制</h3>
                <div class="key-map">
                    <div class="key-item"><span>方向</span><span>W A S D</span></div>
                    <div class="key-item"><span>A按钮</span><span>K</span></div>
                    <div class="key-item"><span>B按钮</span><span>J</span></div>
                    <div class="key-item"><span>Select</span><span>Shift</span></div>
                    <div class="key-item"><span>Start</span><span>Enter</span></div>
                </div>
            </div>

            <div class="control-section">
                <h3>🎮 玩家2 控制</h3>
                <div class="key-map">
                    <div class="key-item"><span>方向</span><span>↑ ↓ ← →</span></div>
                    <div class="key-item"><span>A按钮</span><span>数字2</span></div>
                    <div class="key-item"><span>B按钮</span><span>数字1</span></div>
                    <div class="key-item"><span>Select</span><span>数字8</span></div>
                    <div class="key-item"><span>Start</span><span>数字9</span></div>
                </div>
            </div>

            <div class="control-section">
                <h3>ℹ️ 说明</h3>
                <p style="color: #aaa; font-size: 0.9em;">
                    • 支持所有NES ROM mapper类型<br>
                    • 本地双人同屏对战<br>
                    • 按F11或点击"全屏"按钮进入全屏模式<br>
                    • 支持手柄（自动识别）
                </p>
            </div>
        </div>
    </div>

    <script src="/node_modules/nes-emulator/lib/nes.js"></script>
    <script>
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let nes = null;
        let isRunning = false;
        let isPaused = false;
        let frameTimer = null;
        const screenBuffer = ctx.createImageData(256, 240);

        // 初始化NES
        async function initNES() {
            try {
                nes = new NesEmulator.Nes({
                    onFrame: (buffer) => {
                        // 渲染画面到canvas
                        for (let i = 0; i < buffer.length; i++) {
                            const pixel = i * 4;
                            screenBuffer.data[pixel] = buffer[i];     // R
                            screenBuffer.data[pixel + 1] = buffer[i]; // G
                            screenBuffer.data[pixel + 2] = buffer[i]; // B
                            screenBuffer.data[pixel + 3] = 255;       // A
                        }
                        ctx.putImageData(screenBuffer, 0, 0);
                    },
                    sampleRate: 44100
                });

                // 加载ROM
                const response = await fetch('/nekketsu-fighting-legend-cn.nes');
                if (!response.ok) throw new Error('ROM文件加载失败');

                const buffer = await response.arrayBuffer();
                const romData = new Uint8Array(buffer);
                nes.loadROM(romData);

                updateStatus('ready', 'ROM加载成功！点击"开始游戏"');
                startBtn.disabled = false;
                resetBtn.disabled = false;

            } catch (err) {
                console.error('初始化失败:', err);
                updateStatus('error', '错误: ' + err.message);
            }
        }

        // 开始游戏
        startBtn.addEventListener('click', () => {
            if (isRunning) return;

            isRunning = true;
            isPaused = false;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '暂停';

            // 60fps
            frameTimer = setInterval(() => {
                if (!isPaused && nes) {
                    nes.frame();
                }
            }, 1000 / 60);

            updateStatus('ready', '游戏运行中...');
        });

        // 暂停/继续
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
            updateStatus('ready', isPaused ? '游戏已暂停' : '游戏运行中...');
        });

        // 重置
        resetBtn.addEventListener('click', () => {
            if (frameTimer) {
                clearInterval(frameTimer);
                frameTimer = null;
            }
            isRunning = false;
            isPaused = false;
            pauseBtn.disabled = true;

            if (nes) nes.reset();
            updateStatus('ready', '游戏已重置');
        });

        // 全屏
        fullscreenBtn.addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            }
        });

        // 键盘映射 - 玩家1
        const keyMapP1 = {
            'KeyW': [1, 4],      // 上
            'KeyS': [1, 5],      // 下
            'KeyA': [1, 6],      // 左
            'KeyD': [1, 7],      // 右
            'KeyK': [1, 0],      // A
            'KeyJ': [1, 1],      // B
            'ShiftLeft': [1, 2], // Select
            'Enter': [1, 3]      // Start
        };

        // 键盘映射 - 玩家2
        const keyMapP2 = {
            'ArrowUp': [2, 4],
            'ArrowDown': [2, 5],
            'ArrowLeft': [2, 6],
            'ArrowRight': [2, 7],
            'Digit2': [2, 0],    // A
            'Digit1': [2, 1],    // B
            'Digit8': [2, 2],    // Select
            'Digit9': [2, 3]     // Start
        };

        document.addEventListener('keydown', (e) => {
            if (!isRunning || !nes) return;

            // 玩家1
            if (keyMapP1[e.code]) {
                const [player, button] = keyMapP1[e.code];
                nes.buttonDown(player, button);
                e.preventDefault();
            }

            // 玩家2
            if (keyMapP2[e.code]) {
                const [player, button] = keyMapP2[e.code];
                nes.buttonDown(player, button);
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (!isRunning || !nes) return;

            // 玩家1
            if (keyMapP1[e.code]) {
                const [player, button] = keyMapP1[e.code];
                nes.buttonUp(player, button);
                e.preventDefault();
            }

            // 玩家2
            if (keyMapP2[e.code]) {
                const [player, button] = keyMapP2[e.code];
                nes.buttonUp(player, button);
                e.preventDefault();
            }
        });

        function updateStatus(type, message) {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        // 初始化
        window.addEventListener('load', () => {
            if (typeof NesEmulator !== 'undefined') {
                initNES();
            } else {
                updateStatus('error', 'NES模拟器库加载失败');
            }
        });
    </script>
</body>
</html>
