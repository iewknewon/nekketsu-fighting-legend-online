<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>键盘输入诊断</title>
    <style>
        :root {
            --bg: #111315;
            --panel: #1c2127;
            --line: #38424d;
            --text: #edf2f7;
            --muted: #98a2ad;
            --ok: #4ade80;
            --warn: #fbbf24;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            padding: 24px;
        }

        .shell {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
        }

        h1, h2, p {
            margin: 0;
        }

        .muted {
            color: var(--muted);
        }

        .focus-box {
            min-height: 220px;
            border: 2px dashed #5a6a7a;
            border-radius: 14px;
            display: grid;
            place-items: center;
            padding: 20px;
            text-align: center;
            outline: none;
            background: #0d1013;
        }

        .focus-box.focused {
            border-color: var(--ok);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.18);
        }

        .status {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--muted);
        }

        .badge.ok {
            color: var(--ok);
            border-color: rgba(74, 222, 128, 0.5);
        }

        .badge.warn {
            color: var(--warn);
            border-color: rgba(251, 191, 36, 0.5);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid var(--line);
            background: #11161b;
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font: inherit;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            background: #0d1013;
            border-radius: 12px;
            padding: 14px;
            min-height: 240px;
            max-height: 420px;
            overflow: auto;
            border: 1px solid #24303b;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="card">
            <h1>键盘输入诊断</h1>
            <p class="muted">只测一件事：你的浏览器页面有没有收到按键。</p>
        </section>

        <section class="card">
            <h2>怎么测</h2>
            <p class="muted">先点下面这个大框，再按方向键、WASD、J、K、Enter。只要收到按键，下面日志就会变化。</p>
        </section>

        <section class="card">
            <div id="focusBox" class="focus-box" tabindex="0">
                <div>
                    <div style="font-size: 22px;">点击这里后按键</div>
                    <div class="muted" style="margin-top: 8px;">如果这里收不到键盘事件，模拟器页面也一定收不到</div>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="status">
                <div id="focusState" class="badge warn">焦点：未获取</div>
                <div id="keydownState" class="badge warn">按键：还没收到</div>
                <div id="activeState" class="badge">activeElement: unknown</div>
            </div>
        </section>

        <section class="card">
            <div class="toolbar">
                <button id="focusButton" type="button">重新获取焦点</button>
                <button id="clearButton" type="button">清空日志</button>
            </div>
        </section>

        <section class="card">
            <pre id="log">等待按键...</pre>
        </section>
    </div>

    <script>
        const focusBox = document.getElementById("focusBox");
        const focusState = document.getElementById("focusState");
        const keydownState = document.getElementById("keydownState");
        const activeState = document.getElementById("activeState");
        const log = document.getElementById("log");
        const focusButton = document.getElementById("focusButton");
        const clearButton = document.getElementById("clearButton");

        function setFocused(focused) {
            focusBox.classList.toggle("focused", focused);
            focusState.className = "badge " + (focused ? "ok" : "warn");
            focusState.textContent = "焦点：" + (focused ? "已获取" : "未获取");
        }

        function updateActiveElement() {
            const el = document.activeElement;
            const tag = el ? el.tagName.toLowerCase() : "none";
            const id = el && el.id ? "#" + el.id : "";
            activeState.textContent = "activeElement: " + tag + id;
        }

        function writeLine(text) {
            const now = new Date().toLocaleTimeString();
            if (log.textContent === "等待按键...") {
                log.textContent = "";
            }
            log.textContent = `[${now}] ${text}\n` + log.textContent;
        }

        function handleKey(event, source) {
            keydownState.className = "badge ok";
            keydownState.textContent = "按键：已收到";
            writeLine(
                `${source} ${event.type} key=${event.key} code=${event.code} keyCode=${event.keyCode} ctrl=${event.ctrlKey} alt=${event.altKey} shift=${event.shiftKey}`
            );
        }

        focusBox.addEventListener("focus", () => {
            setFocused(true);
            updateActiveElement();
        });

        focusBox.addEventListener("blur", () => {
            setFocused(false);
            updateActiveElement();
        });

        ["keydown", "keyup"].forEach((type) => {
            focusBox.addEventListener(type, (event) => handleKey(event, "box"));
            window.addEventListener(type, (event) => handleKey(event, "window"), true);
        });

        document.addEventListener("focusin", updateActiveElement);
        window.addEventListener("load", () => {
            focusBox.focus();
            setFocused(true);
            updateActiveElement();
        });

        focusButton.addEventListener("click", () => {
            focusBox.focus();
            setFocused(true);
            updateActiveElement();
            writeLine("手动重新获取焦点");
        });

        clearButton.addEventListener("click", () => {
            log.textContent = "等待按键...";
            keydownState.className = "badge warn";
            keydownState.textContent = "按键：还没收到";
        });
    </script>
</body>
</html>
