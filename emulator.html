<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热血格斗传说 - NES模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #ff0000;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #ffff00;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2em;
            color: #ffff00;
            margin-bottom: 30px;
        }
        .screen-container {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #000;
            border: 2px solid #333;
        }
        .controls {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .control-section {
            margin-bottom: 15px;
        }
        .control-section h3 {
            color: #ffff00;
            font-size: 1.1em;
            margin-bottom: 10px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 5px;
        }
        .key-map {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 0.9em;
        }
        .key-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        .key-name {
            color: #aaa;
        }
        .key-value {
            color: #fff;
            font-weight: bold;
        }
        .status {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .status.loading {
            color: #ffff00;
        }
        .status.ready {
            color: #00ff00;
        }
        .status.error {
            color: #ff0000;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ff0000;
            color: #fff;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #cc0000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.5);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .footer {
            text-align: center;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>热血格斗传说</h1>
        <p class="subtitle">熱血格闘伝説 / Nekketsu Kakutou Densetsu</p>

        <div class="status loading" id="status">正在加载模拟器...</div>

        <div class="buttons">
            <button id="startBtn" disabled>开始游戏</button>
            <button id="resetBtn" disabled>重置</button>
            <button id="pauseBtn" disabled>暂停</button>
        </div>

        <div class="screen-container">
            <canvas id="screen" width="256" height="240"></canvas>
        </div>

        <div class="controls">
            <div class="control-section">
                <h3>🎮 玩家1 控制</h3>
                <div class="key-map">
                    <div class="key-item"><span class="key-name">方向移动</span><span class="key-value">W A S D</span></div>
                    <div class="key-item"><span class="key-name">拳击 (B)</span><span class="key-value">J</span></div>
                    <div class="key-item"><span class="key-name">踢腿 (A)</span><span class="key-value">K</span></div>
                    <div class="key-item"><span class="key-name">选择 (Select)</span><span class="key-value">Shift</span></div>
                    <div class="key-item"><span class="key-name">开始 (Start)</span><span class="key-value">Enter</span></div>
                </div>
            </div>

            <div class="control-section">
                <h3>🎮 玩家2 控制</h3>
                <div class="key-map">
                    <div class="key-item"><span class="key-name">方向移动</span><span class="key-value">↑ ↓ ← →</span></div>
                    <div class="key-item"><span class="key-name">拳击 (B)</span><span class="key-value">数字键 1</span></div>
                    <div class="key-item"><span class="key-name">踢腿 (A)</span><span class="key-value">数字键 2</span></div>
                    <div class="key-item"><span class="key-name">选择 (Select)</span><span class="key-value">数字键 8</span></div>
                    <div class="key-item"><span class="key-name">开始 (Start)</span><span class="key-value">数字键 9</span></div>
                </div>
            </div>

            <div class="control-section">
                <h3>ℹ️ 提示</h3>
                <div class="key-map">
                    <div class="key-item"><span class="key-name">支持手柄</span><span class="key-value">自动识别</span></div>
                    <div class="key-item"><span class="key-name">全屏</span><span class="key-value">F11</span></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 1992 TECHNOS JAPAN · 模拟器基于 JSNES</p>
        </div>
    </div>

    <script type="module">
        import { NES } from '/node_modules/jsnes/dist/jsnes.js';

        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        let nes = null;
        let romData = null;
        let isRunning = false;
        let isPaused = false;
        let frameTimer = null;

        // 屏幕缓冲
        const screenBuffer = ctx.createImageData(256, 240);

        // 键盘映射 (玩家1)
        const keyMap1 = {
            'KeyW': 0,      // 上
            'KeyS': 1,      // 下
            'KeyA': 2,      // 左
            'KeyD': 3,      // 右
            'KeyJ': 4,      // A (踢腿)
            'KeyK': 5,      // B (拳击)
            'ShiftLeft': 6, // Select
            'Enter': 7      // Start
        };

        // 键盘映射 (玩家2)
        const keyMap2 = {
            'ArrowUp': 0,
            'ArrowDown': 1,
            'ArrowLeft': 2,
            'ArrowRight': 3,
            'Digit1': 4,    // A
            'Digit2': 5,    // B
            'Digit8': 6,    // Select
            'Digit9': 7     // Start
        };

        // 初始化NES
        function initNES() {
            nes = new NES({
                onFrame: (framebuffer) => {
                    // 渲染画面
                    for (let i = 0; i < framebuffer.length; i++) {
                        const color = framebuffer[i];
                        const pixel = i * 4;
                        screenBuffer.data[pixel] = (color >> 16) & 0xFF;     // R
                        screenBuffer.data[pixel + 1] = (color >> 8) & 0xFF;  // G
                        screenBuffer.data[pixel + 2] = color & 0xFF;         // B
                        screenBuffer.data[pixel + 3] = 255;                  // A
                    }
                    ctx.putImageData(screenBuffer, 0, 0);
                },
                onAudioSample: (left, right) => {
                    // 音频处理 (暂时忽略)
                }
            });

            updateStatus('ready', '模拟器已准备就绪');
        }

        // 加载ROM
        async function loadROM() {
            try {
                updateStatus('loading', '正在加载ROM...');
                const response = await fetch('/nekketsu-fighting-legend-cn.nes');
                if (!response.ok) throw new Error('ROM文件加载失败');

                const buffer = await response.arrayBuffer();
                romData = new Uint8Array(buffer);

                nes.loadROM(romData);
                updateStatus('ready', 'ROM加载成功！点击"开始游戏"开始');

                startBtn.disabled = false;
                resetBtn.disabled = false;
            } catch (err) {
                updateStatus('error', '错误: ' + err.message);
                console.error(err);
            }
        }

        // 更新状态
        function updateStatus(type, message) {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        // 开始游戏
        function startGame() {
            if (isRunning) return;

            isRunning = true;
            isPaused = false;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '暂停';

            // 60fps
            frameTimer = setInterval(() => {
                if (!isPaused) {
                    nes.frame();
                }
            }, 1000 / 60);

            updateStatus('ready', '游戏运行中...');
        }

        // 暂停/继续
        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
            updateStatus('ready', isPaused ? '游戏已暂停' : '游戏运行中...');
        }

        // 重置
        function reset() {
            if (frameTimer) {
                clearInterval(frameTimer);
                frameTimer = null;
            }
            isRunning = false;
            isPaused = false;
            pauseBtn.disabled = true;

            nes.reset();
            updateStatus('ready', '游戏已重置，点击"开始游戏"重新开始');
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            // 玩家1
            if (keyMap1[e.code] !== undefined) {
                nes.buttonDown(1, keyMap1[e.code]);
                e.preventDefault();
            }

            // 玩家2
            if (keyMap2[e.code] !== undefined) {
                nes.buttonDown(2, keyMap2[e.code]);
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (!isRunning) return;

            // 玩家1
            if (keyMap1[e.code] !== undefined) {
                nes.buttonUp(1, keyMap1[e.code]);
                e.preventDefault();
            }

            // 玩家2
            if (keyMap2[e.code] !== undefined) {
                nes.buttonUp(2, keyMap2[e.code]);
                e.preventDefault();
            }
        });

        // 手柄支持
        let gamepadIndex = -1;
        function pollGamepad() {
            const gamepads = navigator.getGamepads();
            if (!gamepads) return;

            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i];
                if (gp && isRunning) {
                    // 方向键
                    const dpadUp = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
                    const dpadDown = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
                    const dpadLeft = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
                    const dpadRight = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;

                    // 按钮
                    const btnA = gp.buttons[0]?.pressed; // X
                    const btnB = gp.buttons[1]?.pressed; // Circle
                    const btnSelect = gp.buttons[8]?.pressed;
                    const btnStart = gp.buttons[9]?.pressed;

                    // 更新NES控制器状态
                    if (dpadUp) nes.buttonDown(1, 0); else nes.buttonUp(1, 0);
                    if (dpadDown) nes.buttonDown(1, 1); else nes.buttonUp(1, 1);
                    if (dpadLeft) nes.buttonDown(1, 2); else nes.buttonUp(1, 2);
                    if (dpadRight) nes.buttonDown(1, 3); else nes.buttonUp(1, 3);
                    if (btnA) nes.buttonDown(1, 4); else nes.buttonUp(1, 4);
                    if (btnB) nes.buttonDown(1, 5); else nes.buttonUp(1, 5);
                    if (btnSelect) nes.buttonDown(1, 6); else nes.buttonUp(1, 6);
                    if (btnStart) nes.buttonDown(1, 7); else nes.buttonUp(1, 7);
                }
            }

            requestAnimationFrame(pollGamepad);
        }

        window.addEventListener('gamepadconnected', (e) => {
            console.log('手柄已连接:', e.gamepad.id);
            updateStatus('ready', `手柄已连接: ${e.gamepad.id}`);
            pollGamepad();
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', reset);
        pauseBtn.addEventListener('click', togglePause);

        // 初始化
        initNES();
        loadROM();
    </script>
</body>
</html>
