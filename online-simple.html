<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热血格斗传说 - 在线联机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #ff0000;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #ffff00;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2em;
            color: #ffff00;
            margin-bottom: 30px;
        }
        .status {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .status.info { color: #00bfff; }
        .status.success { color: #00ff00; }
        .status.warning { color: #ffff00; }
        .status.error { color: #ff0000; }
        .lobby {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .lobby h2 {
            color: #ffff00;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #333;
            border-radius: 5px;
            background: #222;
            color: #fff;
            font-size: 1em;
        }
        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ff0000;
            color: #fff;
            font-weight: bold;
            transition: all 0.3s;
            margin-right: 10px;
        }
        button:hover:not(:disabled) {
            background: #cc0000;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .emulator-container {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        #emulator-frame {
            width: 768px;
            height: 720px;
            border: 2px solid #333;
            max-width: 100%;
        }
        .room-info {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-id {
            font-size: 1.5em;
            color: #ffff00;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
        .controls {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>热血格斗传说</h1>
        <p class="subtitle">在线联机对战 · Online Multiplayer</p>

        <div class="status info" id="mainStatus">正在连接服务器...</div>

        <!-- 大厅界面 -->
        <div class="lobby" id="lobby">
            <h2>🎮 联机大厅</h2>

            <div class="input-group">
                <label>玩家昵称</label>
                <input type="text" id="playerName" placeholder="输入你的昵称" maxlength="12" value="玩家">
            </div>

            <div style="margin-top: 20px;">
                <button id="createRoomBtn">🏠 创建房间</button>
                <button id="joinRoomBtn">🚪 加入房间</button>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label>房间号（加入时填写）</label>
                <input type="text" id="roomIdInput" placeholder="4位房间号" maxlength="4">
            </div>
        </div>

        <!-- 等待界面 -->
        <div class="lobby hidden" id="waitingRoom">
            <h2>⏳ 等待玩家</h2>
            <div class="room-info">
                <div>
                    <div class="room-id">房间号: <span id="displayRoomId">----</span></div>
                    <div style="color: #aaa; margin-top: 5px;">
                        玩家1: <span id="player1Name">-</span> |
                        玩家2: <span id="player2Name">等待中...</span>
                    </div>
                </div>
                <div>
                    <button id="startGameBtn" disabled>开始游戏</button>
                    <button id="leaveRoomBtn">离开</button>
                </div>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div class="hidden" id="gameView">
            <div class="room-info">
                <div class="room-id">房间: <span id="gameRoomId">----</span></div>
                <button id="quitBtn">退出</button>
            </div>

            <div class="emulator-container">
                <iframe id="emulator-frame" src="about:blank"></iframe>
            </div>

            <div class="controls">
                <strong style="color: #ffff00;">说明:</strong><br>
                当前使用iframe内嵌模拟器。由于ROM mapper兼容性问题，建议:<br>
                1. 使用在线NES模拟器网站（如 virtualnes.com 或 playclassic.games）<br>
                2. 手动上传ROM文件到模拟器<br>
                3. 联机功能通过WebSocket同步双方按键输入<br><br>
                <em>或者，你可以找一个mapper类型更简单的ROM版本（mapper 0-4）</em>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentRoom = null;
        let playerRole = null;

        const mainStatus = document.getElementById('mainStatus');
        const lobby = document.getElementById('lobby');
        const waitingRoom = document.getElementById('waitingRoom');
        const gameView = document.getElementById('gameView');

        const playerNameInput = document.getElementById('playerName');
        const roomIdInput = document.getElementById('roomIdInput');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const startGameBtn = document.getElementById('startGameBtn');
        const leaveRoomBtn = document.getElementById('leaveRoomBtn');
        const quitBtn = document.getElementById('quitBtn');

        const displayRoomId = document.getElementById('displayRoomId');
        const gameRoomId = document.getElementById('gameRoomId');
        const player1Name = document.getElementById('player1Name');
        const player2Name = document.getElementById('player2Name');

        // 连接WebSocket
        function connectWebSocket() {
            const wsUrl = `ws://${location.hostname}:3001`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket已连接');
                mainStatus.textContent = '已连接到服务器，可以创建或加入房间';
                mainStatus.className = 'status success';
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleServerMessage(message);
            };

            ws.onclose = () => {
                console.log('WebSocket已断开');
                mainStatus.textContent = '与服务器断开连接';
                mainStatus.className = 'status error';
            };

            ws.onerror = (err) => {
                console.error('WebSocket错误:', err);
                mainStatus.textContent = '连接服务器失败';
                mainStatus.className = 'status error';
            };
        }

        // 处理服务器消息
        function handleServerMessage(message) {
            console.log('收到消息:', message);

            switch (message.type) {
                case 'ROOM_CREATED':
                    currentRoom = message.roomId;
                    playerRole = 'host';
                    displayRoomId.textContent = currentRoom;
                    player1Name.textContent = playerNameInput.value;
                    player2Name.textContent = '等待中...';
                    showWaitingRoom();
                    mainStatus.textContent = `房间创建成功！房间号: ${currentRoom}`;
                    mainStatus.className = 'status success';
                    break;

                case 'ROOM_JOINED':
                    currentRoom = message.roomId;
                    playerRole = 'guest';
                    displayRoomId.textContent = currentRoom;
                    player1Name.textContent = message.hostName;
                    player2Name.textContent = playerNameInput.value;
                    showWaitingRoom();
                    mainStatus.textContent = '已加入房间，等待房主开始';
                    mainStatus.className = 'status success';
                    break;

                case 'PLAYER_JOINED':
                    player2Name.textContent = message.playerName;
                    mainStatus.textContent = '玩家2已加入，可以开始游戏！';
                    mainStatus.className = 'status success';
                    if (playerRole === 'host') {
                        startGameBtn.disabled = false;
                    }
                    break;

                case 'GAME_START':
                    startGame();
                    break;

                case 'PLAYER_LEFT':
                    mainStatus.textContent = '对手已离开';
                    mainStatus.className = 'status warning';
                    if (playerRole === 'host') {
                        startGameBtn.disabled = true;
                    }
                    player2Name.textContent = '等待中...';
                    break;

                case 'ERROR':
                    alert(message.message);
                    mainStatus.textContent = message.message;
                    mainStatus.className = 'status error';
                    break;
            }
        }

        // 界面切换
        function showLobby() {
            lobby.classList.remove('hidden');
            waitingRoom.classList.add('hidden');
            gameView.classList.add('hidden');
        }

        function showWaitingRoom() {
            lobby.classList.add('hidden');
            waitingRoom.classList.remove('hidden');
            gameView.classList.add('hidden');
        }

        function showGameView() {
            lobby.classList.add('hidden');
            waitingRoom.classList.add('hidden');
            gameView.classList.remove('hidden');
        }

        function startGame() {
            showGameView();
            gameRoomId.textContent = currentRoom;
            mainStatus.textContent = '游戏开始！';
            mainStatus.className = 'status success';

            // 加载ROM到iframe（这里需要一个支持的模拟器）
            document.getElementById('emulator-frame').src = 'emulator.html';
        }

        // 按钮事件
        createRoomBtn.addEventListener('click', () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('未连接到服务器！');
                return;
            }

            const name = playerNameInput.value.trim() || '玩家';
            ws.send(JSON.stringify({
                type: 'CREATE_ROOM',
                playerName: name
            }));

            mainStatus.textContent = '正在创建房间...';
            mainStatus.className = 'status info';
        });

        joinRoomBtn.addEventListener('click', () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('未连接到服务器！');
                return;
            }

            const roomId = roomIdInput.value.trim();
            if (roomId.length !== 4) {
                alert('请输入4位房间号');
                return;
            }

            const name = playerNameInput.value.trim() || '玩家';
            ws.send(JSON.stringify({
                type: 'JOIN_ROOM',
                roomId: roomId,
                playerName: name
            }));

            mainStatus.textContent = '正在加入房间...';
            mainStatus.className = 'status info';
        });

        startGameBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'START_GAME' }));
            }
        });

        leaveRoomBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'LEAVE_ROOM' }));
            }
            showLobby();
            mainStatus.textContent = '已离开房间';
            mainStatus.className = 'status info';
        });

        quitBtn.addEventListener('click', () => {
            if (confirm('确定要退出游戏吗？')) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'LEAVE_ROOM' }));
                }
                showLobby();
            }
        });

        // 初始化
        connectWebSocket();
    </script>
</body>
</html>
